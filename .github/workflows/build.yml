name: Build Flet APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Kopyala
        uses: actions/checkout@v4

      - name: Java Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Flet Kurulumu
        run: pip install flet

      - name: APK'yı İnşa Et (Otomatik Onaylı)
        run: yes | flet build apk

      - name: APK Dosyasını Çıkar
        uses: actions/upload-artifact@v4
        with:
          name: saha-kalibrasyon-apk
          path: build/apk/**/*.apk
